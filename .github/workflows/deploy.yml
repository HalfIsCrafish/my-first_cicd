name: Deploy to VPS

on:
  workflow_run:
    workflows: ["Build and Push Docker Image"] # fajnie ezzz
    types:
      - completed
    branches: [master]  # Zmień na [main], jeśli taką masz nazwę gałęzi

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy na serwer OVH przez SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Logowanie do GHCR (zwróć uwagę na wcięcie pod 'script')
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Zatrzymaj i usuń poprzedni kontener
            docker stop my-app || true
            docker rm my-app || true

            # Pobierz najnowszy obraz (używamy github.repository_owner dla halfiscrayfish)
            docker pull ghcr.io/${{ github.repository_owner }}/my-first_cicd:latest

            # Uruchom kontener
            docker run -d \
              --name my-app \
              --restart unless-stopped \
              -p 8${{ secrets.VPS_PORT_NUMBER }}:80 \
              ghcr.io/${{ github.repository_owner }}/my-first_cicd:latest